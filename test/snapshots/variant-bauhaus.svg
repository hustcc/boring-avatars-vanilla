<svg
  viewBox="0 0 80 80"
  fill="none"
  role="img"
  xmlns="http://www.w3.org/2000/svg"
  width="40px"
  height="40px"
>
  
  <mask id="boring-avatar-ID" maskUnits="userSpaceOnUse" x="0" y="0" width="80" height="80">
    <rect width="80" height="80" rx="160" fill="#FFFFFF" />
  </mask>
  <g mask="url(#boring-avatar-ID)">
    <rect width="80" height="80" fill="#146A7C" />
    <rect
      x="10"
      y="30"
      width="80"
      height="80"
      fill="#F0AB3D"
      transform="translate(-18 18) rotate(22 40 40)"
    />
    <circle
      cx="40"
      cy="40"
      fill="#C271B4"
      r="16"
      transform="translate(0 0)"
    />
    <line
      x1="0"
      y1="40"
      x2="80"
      y2="40"
      stroke-width="2"
      stroke="#C20D90"
      transform="translate(-4 -4) rotate(44 40 40)"
    />
  </g>
</svg>